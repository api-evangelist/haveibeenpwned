aid: haveibeenpwned
name: HaveIBeenPwned
description: >-
  Have I Been Pwned (HIBP) is Troy Hunt's free breach-notification and credential-exposure service. The HIBP API v3 lets
  clients search for email addresses, pastes, stealer-log entries, and monitored domains across the world's largest
  aggregated breach corpus. A separate free k-anonymity password lookup is offered at api.pwnedpasswords.com.
